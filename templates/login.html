<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-top: 0; color: #111827; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        button {
            flex: 1; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: background-color 0.2s; font-family: 'Inter', sans-serif;
        }
        .btn-login { background-color: var(--primary); color: white; }
        .btn-login:hover { background-color: #1d4ed8; }
        .btn-register { background-color: #e5e7eb; color: #374151; }
        .btn-register:hover { background-color: #d1d5db; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
        .alert.danger { background-color: #fee2e2; color: #991b1b; }
        .alert.success { background-color: #dcfce3; color: #166534; }
        .links { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .links a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Autenticação Segura</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" required>
            </div>
            
            <div class="btn-group">
                <button type="submit" name="action" value="login" class="btn-login">Entrar</button>
                <button type="submit" name="action" value="register" class="btn-register">Criar Conta</button>
            </div>
        </form>
        <div class="links">
            <a href="/recuperar">Esqueci minha senha</a>
        </div>
    </div>
</body>
</html>
