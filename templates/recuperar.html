<!DOCTYPE html>
<html>
<head><title>Recuperação de Senha</title></head>
<body style="font-family: Arial; padding: 20px;">
    <h2>{{ 'Redefinir Senha' if reset_mode else 'Recuperar Conta' }}</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <p style="color: {{ 'red' if category == 'danger' else 'green' }}; font-weight: bold;">{{ message }}</p>
        {% endfor %}
    {% endwith %}

    {% if reset_mode %}
    <form method="POST">
        <label>Nova Senha:</label><br>
        <input type="password" name="password" required><br><br>
        <button type="submit">Atualizar Senha</button>
    </form>
    {% else %}
    <form method="POST">
        <label>Nome de usuário para recuperação:</label><br>
        <input type="text" name="username" required><br><br>
        <button type="submit">Solicitar Link</button>
    </form>
    <br>
    <a href="/">Voltar ao Login</a>
    {% endif %}
</body>
</html>
