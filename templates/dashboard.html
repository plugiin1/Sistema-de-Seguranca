<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h3 class="mb-0 fw-bold">Bem-vindo, {{ username }}!</h3>
                <a href="{{ url_for('logout') }}" class="btn btn-danger fw-bold">Sair do Sistema</a>
            </div>
        </div>
        
        <div class="mt-4 p-4 bg-white border rounded shadow-sm">
            <h5 class="fw-bold">Status do Sistema</h5>
            <p class="text-success mb-0 fw-semibold">✅ Autenticação multifator validada com sucesso. Você está em um ambiente seguro.</p>
        </div>
    </div>
</body>
</html>
